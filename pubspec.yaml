name: papirar
description: App de estudo de lei seca com leitura, áudio, marcações e revisão.
publish_to: "none"
version: 1.0.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  audio_service: ^0.18.0
  audio_session: ^0.1.18
  connectivity_plus: ^6.1.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.0
  flutter_dotenv: ^5.2.0
  flutter_native_splash: ^2.4.4
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  iconsax_flutter: 1.0.1
  image_cropper: ^12.2.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  just_audio: ^0.9.39
  lottie: ^3.1.2
  path_provider: ^2.1.4
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.3.0
  supabase_flutter: ^2.8.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.2.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/logo/
    - assets/json/
    - assets/json/codigos/
    - assets/json/constituicao/
    - assets/json/estatutos/
    - assets/json/leis/
    - assets/json/tratados_internacionais/
